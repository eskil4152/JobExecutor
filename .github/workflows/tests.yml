name: Run tests and update SonarCloud

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - "docs/**"
  push:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - "docs/**"

jobs:
  test-and-update-sonar:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: 24
          distribution: temurin

      - name: Build and run tests
        run: mvn -B clean verify sonar:sonar -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}