spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    database: h2
    show-sql: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:2GB}
      max-request-size: ${MAX_REQUEST_SIZE:2GB}

app:
  max-expansion-ratio: ${MAX_EXPANSION_RATIO:100}
  max-decompressed-size: ${MAX_DECOMPRESSED_SIZE:200MB}

storage:
  path: ./target/test-uploads